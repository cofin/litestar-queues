<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none" role="img" aria-label="Litestar Queues">
  <title>Litestar Queues</title>
  <!-- Icon-only pub/sub fan-out mark, single-color Litestar gold, transparent background -->

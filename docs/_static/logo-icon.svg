    <line x1="15" y1="32" x2="49" y2="15"/>
    <line x1="15" y1="32" x2="51" y2="32"/>
    <line x1="15" y1="32" x2="49" y2="49"/>
  </g>
  <g fill="#edb641">
    <circle cx="15" cy="32" r="6.5"/>
    <circle cx="49" cy="15" r="5.5"/>
    <circle cx="51" cy="32" r="5.5"/>
    <circle cx="49" cy="49" r="5.5"/>
  </g>
</svg>

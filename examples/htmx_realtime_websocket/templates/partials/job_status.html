<div
  id="job-status"
  class="status-strip active"
  data-job-id="{{ job_id }}"
  data-task-id="{{ task_id }}"
  data-task-ws-url="{{ task_ws_url }}"
  data-mission-scope="{{ mission_scope }}"
  data-mission-ws-url="{{ mission_ws_url }}"
>
  <span>Mission {{ job_id }} queued</span>
  <span>Task {{ task_id }}</span>
</div>
